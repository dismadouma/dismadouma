<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#010403"/>
      <stop offset="50%" stop-color="#00140b"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <linearGradient id="greenText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="50%" stop-color="#d7ffe8"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="clip">
      <rect x="24" y="24" width="1152" height="312" rx="22"/>
    </clipPath>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>

  <rect x="24" y="24" width="1152" height="312" rx="22" fill="#020403" stroke="#00ff88" stroke-width="2" filter="url(#softGlow)"/>

  <g clip-path="url(#clip)">
    <g opacity="0.18" fill="#00ff88" font-family="monospace" font-size="15">
      <text x="60" y="40">010101 110010 001101 101010 001111</text>
      <text x="90" y="80">101100 000111 110100 010101 111000</text>
      <text x="50" y="120">001010 110111 011001 101101 000101</text>
      <text x="80" y="160">111001 001100 100101 010010 110110</text>
      <text x="55" y="200">010101 111000 001001 101010 011011</text>
      <text x="90" y="240">101101 010101 111100 000111 101010</text>
      <text x="60" y="280">001101 111010 010101 100011 011100</text>
      <animateTransform attributeName="transform" type="translate" from="0 -80" to="0 80" dur="6s" repeatCount="indefinite"/>
    </g>

    <g opacity="0.12" fill="#00ff88" font-family="monospace" font-size="15">
      <text x="900" y="50">110010 001101 101010</text>
      <text x="930" y="90">001111 111001 000100</text>
      <text x="895" y="130">010101 101010 011100</text>
      <text x="935" y="170">100101 010101 111010</text>
      <text x="900" y="210">111100 010110 001101</text>
      <text x="925" y="250">010101 001111 100101</text>
      <text x="910" y="290">101010 111000 010101</text>
      <animateTransform attributeName="transform" type="translate" from="0 80" to="0 -80" dur="7s" repeatCount="indefinite"/>
    </g>
  </g>

  <line x1="0" y1="175" x2="1200" y2="175" stroke="#00ff88" stroke-width="2" opacity="0.35">
    <animate attributeName="y1" values="90;270;90" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="90;270;90" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.55;0" dur="4s" repeatCount="indefinite"/>
  </line>

  <text x="70" y="85" fill="#00ff88" font-family="monospace" font-size="22" filter="url(#softGlow)">
    root@github:~$ initialize profile
    <animate attributeName="opacity" values="1;0.55;1" dur="2s" repeatCount="indefinite"/>
  </text>

  <g filter="url(#glow)">
    <text x="600" y="175" text-anchor="middle" fill="url(#greenText)" font-family="monospace" font-size="86" font-weight="900" letter-spacing="8">
      DISMADOUMA
      <animate attributeName="opacity" values="0.75;1;0.75" dur="2.4s" repeatCount="indefinite"/>
    </text>
  </g>

  <rect x="330" y="205" width="540" height="95" rx="14" fill="#020403" opacity="0.85" stroke="#00ff88" stroke-width="2" filter="url(#softGlow)"/>

  <g font-family="monospace" font-size="21" fill="#9dffc9">
    <text x="385" y="235">SYSTEM STATUS</text>
    <text x="590" y="235">:</text>
    <text x="630" y="235" fill="#00ff88">ONLINE</text>

    <text x="385" y="260">ACCESS LEVEL</text>
    <text x="590" y="260">:</text>
    <text x="630" y="260" fill="#00ff88">ROOT</text>

    <text x="385" y="285">USERNAME</text>
    <text x="590" y="285">:</text>
    <text x="630" y="285" fill="#00ff88">DISMADOUMA</text>
  </g>

  <g opacity="0.65" stroke="#00ff88" stroke-width="1.5" fill="none">
    <circle cx="180" cy="245" r="58"/>
    <circle cx="180" cy="245" r="35"/>
    <line x1="120" y1="245" x2="240" y2="245"/>
    <line x1="180" y1="185" x2="180" y2="305"/>
    <circle cx="180" cy="245" r="8" fill="#00ff88" filter="url(#glow)">
      <animate attributeName="r" values="5;10;5" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <animateTransform attributeName="transform" type="rotate" from="0 180 245" to="360 180 245" dur="8s" repeatCount="indefinite"/>
  </g>

  <g opacity="0.8" fill="#00ff88">
    <rect x="990" y="285" width="12" height="12"/>
    <rect x="1010" y="285" width="12" height="12"/>
    <rect x="1030" y="285" width="12" height="12"/>
    <rect x="1050" y="285" width="12" height="12"/>
    <rect x="990" y="305" width="40" height="6"/>
    <rect x="1040" y="305" width="80" height="6"/>
    <animate attributeName="opacity" values="0.35;1;0.35" dur="2.2s" repeatCount="indefinite"/>
  </g>

  <path d="M55 52 H235" stroke="#00ff88" stroke-width="2" opacity="0.8">
    <animate attributeName="opacity" values="0.25;1;0.25" dur="2.5s" repeatCount="indefinite"/>
  </path>

  <path d="M965 52 H1135" stroke="#00ff88" stroke-width="2" opacity="0.8">
    <animate attributeName="opacity" values="1;0.25;1" dur="2.5s" repeatCount="indefinite"/>
  </path>

  <rect x="24" y="24" width="1152" height="312" rx="22" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.12"/>
</svg>
